<!DOCTYPE html>

<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">

        <!-- http://getbootstrap.com/docs/5.3/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

        <!-- https://favicon.io/emoji-favicons/film-projector -->
        <link href="/static/favicon.ico" rel="icon">

        <script src="/static/javascript.js" defer></script>

        <link href="/static/styles.css" rel="stylesheet">

        <title>What to watch?!</title>

    </head>

    <body class="d-flex flex-column min-vh-100 {% block body_class %}{% endblock %}">
        {% if request.endpoint != 'index' %}
        <nav class="navbar border-bottom position-relative navbar-colors">
            <div class="container-fluid">
                <a class="navbar-brand navbar-colors" href="/">Home</a>
            </div>

            <div class="navbar-center-title">What to watch?!</div>
            </nav>
        {% endif %}
        
        <div class="main-wrap flex-grow-1">
        <main class="container py-5 text-center">
            {% block main %}{% endblock %}
        </main>
        </div>
        
        {% block extra_footer %}{% endblock %}
        
    </body>

</html>
